port=5353
listen-address=127.0.0.1
bind-interfaces
no-resolv
server=1.1.1.1

# ----------------------------------------------------
# DEFAULT DENY: Block EVERYTHING and send to localhost
# ----------------------------------------------------
address=/#/127.0.0.1

# ----------------------------------------------------
# WHITELIST: Allow these domains to resolve normally
# ----------------------------------------------------

# ChatGPT & OpenAI
server=/chatgpt.com/1.1.1.1
server=/openai.com/1.1.1.1
server=/oaistatic.com/1.1.1.1
server=/oaiusercontent.com/1.1.1.1
server=/auth0.com/1.1.1.1
server=/intercom.io/1.1.1.1
server=/chatgpt.com/8.8.8.8

# Claude
server=/claude.ai/1.1.1.1
server=/anthropic.com/1.1.1.1
server=/usefathom.com/1.1.1.1

# GitHub
server=/github.com/1.1.1.1
server=/githubusercontent.com/1.1.1.1
server=/githubassets.com/1.1.1.1

# PortSwigger
server=/portswigger.net/1.1.1.1

# LinkedIn
server=/linkedin.com/1.1.1.1
server=/licdn.com/1.1.1.1

# Google Search (often needed for engineering jobs)
server=/google.com/1.1.1.1
server=/gstatic.com/1.1.1.1
server=/googleapis.com/1.1.1.1

# Optional: Add any extra domains here and restart focus-dns service
